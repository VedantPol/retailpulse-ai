services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retailpulse-backend
    environment:
      ARTIFACTS_DIR: /app/artifacts
      DATA_SEED: 42
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "18632:8000"
    volumes:
      - retailpulse_artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retailpulse-frontend
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "18631:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  retailpulse_artifacts:
